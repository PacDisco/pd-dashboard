<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Active Leads · Pacific Discovery</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #0b1220;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --hot-sale: #22c55e;
      --hot-opp: #3b82f6;
      --hot-app: #a78bfa;
      --hot-sql: #14b8a6;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 24px 28px 56px; }
    header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 18px; }
    h1 { font-size: 22px; margin: 0; letter-spacing: -0.01em; }
    .meta { font-size: 13px; color: var(--muted); }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .card .value { font-size: 26px; font-weight: 600; margin-top: 4px; }
    .card.sale { border-left: 3px solid var(--hot-sale); }
    .card.opp { border-left: 3px solid var(--hot-opp); }
    .card.app { border-left: 3px solid var(--hot-app); }
    .card.sql { border-left: 3px solid var(--hot-sql); }
    .card.total { border-left: 3px solid var(--accent); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
    .filters input[type=search] {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-size: 14px; min-width: 220px;
    }
    .chip {
      padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel-2);
      color: var(--muted); cursor: pointer; font-size: 13px; user-select: none;
    }
    .chip.active { background: var(--accent); color: #1a1206; border-color: var(--accent); font-weight: 600; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13.5px; vertical-align: top; }
    th { background: var(--panel-2); color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; font-weight: 600; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    .bucket { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .bucket.Sale { background: rgba(34,197,94,0.15); color: var(--hot-sale); }
    .bucket.Opportunity { background: rgba(59,130,246,0.15); color: var(--hot-opp); }
    .bucket.Applicant { background: rgba(167,139,250,0.15); color: var(--hot-app); }
    .bucket.SQL { background: rgba(20,184,166,0.15); color: var(--hot-sql); }
    .bucket.HotLead, .bucket["Hot Lead"] { background: rgba(239,68,68,0.18); color: #fca5a5; }
    .score-pill { display: inline-block; background: rgba(20,184,166,0.15); color: var(--hot-sql); padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 4px; }
    .signal-tag { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
    .flag-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 3px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .flag-btn:hover { color: var(--text); border-color: var(--danger); }
    .flag-btn.flagged { background: rgba(239,68,68,0.15); color: #fca5a5; border-color: var(--danger); }
    .flag-btn.flagged:hover { background: rgba(239,68,68,0.25); }
    tr.flagged { background: rgba(239,68,68,0.05); }
    tr.flagged td:first-child { border-left: 3px solid var(--danger); }
    .hot-note { display: block; font-size: 12px; color: #fca5a5; font-style: italic; margin-top: 2px; max-width: 280px; white-space: normal; }
    dialog.flag-dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 0; max-width: 420px; }
    dialog.flag-dialog::backdrop { background: rgba(0,0,0,0.6); }
    .dialog-inner { padding: 18px 20px; }
    .dialog-inner h3 { margin: 0 0 6px; font-size: 16px; }
    .dialog-inner textarea { width: 100%; min-height: 80px; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px; font: inherit; resize: vertical; }
    .dialog-inner input[type=text] { width: 100%; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font: inherit; margin-bottom: 10px; }
    .dialog-inner label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
    .dialog-actions button { padding: 6px 14px; border-radius: 6px; font: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); }
    .dialog-actions button.primary { background: var(--danger); color: white; border-color: var(--danger); }
    .urgency { font-weight: 600; }
    .urgency.warn { color: var(--accent); }
    .urgency.danger { color: var(--danger); }
    .amount { font-variant-numeric: tabular-nums; text-align: right; }
    a { color: #93c5fd; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .name-cell { font-weight: 600; }
    .sub { color: var(--muted); font-size: 12px; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .error { background: rgba(239,68,68,0.15); border: 1px solid var(--danger); color: #fecaca; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
    @media (max-width: 760px) {
      .wrap { padding: 16px; }
      table { font-size: 12.5px; }
      th, td { padding: 8px; }
      .hide-sm { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Active Leads · Pacific Discovery</h1>
        <div class="meta" id="meta">Loading…</div>
      </div>
      <div class="meta" id="refresh-info"></div>
    </header>

    <div id="error" class="error" hidden></div>

    <section class="metrics">
      <div class="card total">
        <div class="label">Active Leads</div>
        <div class="value" id="m-total">—</div>
      </div>
      <div class="card opp">
        <div class="label">Opportunity (app + fee)</div>
        <div class="value" id="m-opp">—</div>
      </div>
      <div class="card app">
        <div class="label">Applicant (no fee)</div>
        <div class="value" id="m-app">—</div>
      </div>
      <div class="card sql">
        <div class="label">SQL (scored)</div>
        <div class="value" id="m-sql">—</div>
      </div>
      <div class="card">
        <div class="label">Potential Pipeline $</div>
        <div class="value" id="m-value">—</div>
      </div>
    </section>

    <div class="filters">
      <input id="q" type="search" placeholder="Search name, email, program, owner…" />
      <span class="chip active" data-bucket="all">All</span>
      <span class="chip" data-bucket="flagged">🔥 Flagged</span>
      <span class="chip" data-bucket="Opportunity">Opportunity</span>
      <span class="chip" data-bucket="Applicant">Applicant</span>
      <span class="chip" data-bucket="SQL">SQL</span>
    </div>

    <dialog class="flag-dialog" id="flag-dialog">
      <form method="dialog" class="dialog-inner" id="flag-form">
        <h3 id="flag-dialog-title">Flag as hot lead</h3>
        <p class="meta" id="flag-dialog-name" style="margin:0 0 12px;"></p>
        <label for="flag-who">Your name (for audit trail)</label>
        <input type="text" id="flag-who" placeholder="e.g. Jake" required />
        <label for="flag-note">Note (optional)</label>
        <textarea id="flag-note" placeholder="Why are you flagging this lead?"></textarea>
        <div class="dialog-actions">
          <button type="button" value="cancel" id="flag-cancel">Cancel</button>
          <button type="submit" class="primary" id="flag-confirm">Flag</button>
        </div>
      </form>
    </dialog>

    <table id="table">
      <thead>
        <tr>
          <th>Stage</th>
          <th>Name</th>
          <th class="hide-sm">Program / Pipeline</th>
          <th>Owner</th>
          <th class="hide-sm">Days in stage</th>
          <th>Days since touch</th>
          <th class="amount">Amount</th>
          <th>HubSpot</th>
          <th>🔥</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const FEED_URL = "/.netlify/functions/hot-leads";
    const fmtMoney = n => n == null ? "—" : new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);
    const fmtRelative = iso => {
      if (!iso) return "—";
      const d = new Date(iso);
      const diff = Math.round((Date.now() - d.getTime()) / 86400000);
      if (diff <= 0) return "today";
      if (diff === 1) return "1 day ago";
      if (diff < 7) return diff + " days ago";
      if (diff < 30) return Math.round(diff / 7) + " weeks ago";
      return d.toLocaleDateString();
    };
    const urgencyClass = d => d == null ? "" : d >= 7 ? "danger" : d >= 3 ? "warn" : "";

    let allRecords = [];
    let activeBucket = "all";
    let query = "";

    async function load() {
      try {
        const res = await fetch(FEED_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("Feed responded " + res.status);
        const data = await res.json();
        renderSummary(data.summary);
        allRecords = data.records || [];
        if (data.message) showError(data.message);
        render();
      } catch (err) {
        showError("Could not load feed: " + err.message);
      }
    }

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.hidden = false;
    }

    let currentSummary = null;

    function renderSummary(s) {
      currentSummary = s || null;
      const appPipes = s?.pipelinesScanned?.applicant?.length ?? 0;
      const oppPipes = s?.pipelinesScanned?.opportunity?.length ?? 0;
      const meta = s?.generatedAt
        ? `Generated ${fmtRelative(s.generatedAt)} · ${appPipes} Applicant + ${oppPipes} Opportunity pipelines · last ${s.recencyDays ?? 14} days · SQL threshold ${s.sqlThreshold ?? 30} · excludes Sale + Closed Won`
        : "Feed has not been generated yet.";
      document.getElementById("meta").textContent = meta;
      // Counts are rendered from the filtered set by renderMetrics() — called
      // from render() on every filter/search change.
    }

    function renderMetrics(filtered) {
      const total = filtered.length;
      const opp   = filtered.filter(r => r.bucket === "Opportunity").length;
      const app   = filtered.filter(r => r.bucket === "Applicant").length;
      const sql   = filtered.filter(r => r.bucket === "SQL").length;
      const value = filtered.reduce((s, r) => s + (r.amount || 0), 0);
      const showingAll = activeBucket === "all" && !query;
      const totalLabel = document.querySelector(".card.total .label");
      if (totalLabel) totalLabel.textContent = showingAll ? "Active Leads" : "Filtered Leads";
      document.getElementById("m-total").textContent = total;
      document.getElementById("m-opp").textContent = opp;
      document.getElementById("m-app").textContent = app;
      document.getElementById("m-sql").textContent = sql;
      document.getElementById("m-value").textContent = fmtMoney(value);
    }

    function matches(r) {
      if (activeBucket === "flagged") {
        if (!r.isHotLead) return false;
      } else if (activeBucket !== "all") {
        if (r.bucket !== activeBucket) return false;
      }
      if (!query) return true;
      const hay = [
        r.name, r.email, r.dealName, r.pipelineLabel, r.stageLabel, r.owner, r.hotLeadNote
      ].filter(Boolean).join(" ").toLowerCase();
      return hay.includes(query);
    }

    function render() {
      const rows = allRecords.filter(matches);
      renderMetrics(rows);
      const tbody = document.getElementById("tbody");
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="9" class="empty">No matching hot leads.</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(r => {
        const scorePill = r.sqlScore != null ? `<span class="score-pill">${r.sqlScore}</span>` : "";
        const topSignalHint = r.sqlTopSignal ? `<div class="signal-tag">${escapeHtml(formatSignal(r.sqlTopSignal))}</div>` : "";
        const bucketClass = r.bucket === "Hot Lead" ? "HotLead" : r.bucket;
        const noteLine = r.isHotLead && r.hotLeadNote
          ? `<span class="hot-note">🔥 ${escapeHtml(r.hotLeadNote)}${r.hotLeadFlaggedBy ? ` — ${escapeHtml(r.hotLeadFlaggedBy)}` : ""}</span>`
          : r.isHotLead
            ? `<span class="hot-note">🔥 Flagged${r.hotLeadFlaggedBy ? ` by ${escapeHtml(r.hotLeadFlaggedBy)}` : ""}</span>`
            : "";
        const flagBtnLabel = r.isHotLead ? "🔥 Unflag" : "🔥 Flag";
        return `
        <tr class="${r.isHotLead ? 'flagged' : ''}">
          <td><span class="bucket ${bucketClass}">${r.bucket}</span>${scorePill}<div class="sub">${escapeHtml(r.stageLabel || "")}</div>${topSignalHint}${noteLine}</td>
          <td class="name-cell">${escapeHtml(r.name || "—")}<div class="sub">${escapeHtml(r.email || "")}</div></td>
          <td class="hide-sm">${escapeHtml(r.pipelineLabel || "—")}</td>
          <td>${escapeHtml(r.owner || "—")}</td>
          <td class="hide-sm urgency ${urgencyClass(r.daysInStage)}">${r.daysInStage ?? "—"}</td>
          <td class="urgency ${urgencyClass(r.daysSinceTouch)}">${r.daysSinceTouch ?? "—"}</td>
          <td class="amount">${fmtMoney(r.amount)}</td>
          <td>${r.contactUrl ? `<a href="${r.contactUrl}" target="_blank" rel="noopener">Contact ↗</a>` : "—"}${r.dealUrl ? ` · <a href="${r.dealUrl}" target="_blank" rel="noopener">Deal ↗</a>` : ""}</td>
          <td><button class="flag-btn ${r.isHotLead ? 'flagged' : ''}" data-contact-id="${r.contactId}" data-action="${r.isHotLead ? 'unflag' : 'flag'}" data-name="${escapeHtml(r.name || '')}">${flagBtnLabel}</button></td>
        </tr>
      `;}).join("");
    }

    function formatSignal(key) {
      const map = {
        form_last_14d: "Form submitted ≤14d",
        multi_forms: "Multiple forms",
        meeting_booked: "Meeting booked",
        email_replied_14d: "Replied to sales email",
        email_clicked_14d: "Clicked sales email",
        email_opened_7d: "Opened sales email",
        sessions_3_14d: "3+ site visits",
        pageview_7d: "Recent pageview",
        has_owner: "Has owner",
      };
      return map[key] || key;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }

    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        activeBucket = chip.dataset.bucket;
        render();
      });
    });
    document.getElementById("q").addEventListener("input", e => {
      query = e.target.value.trim().toLowerCase();
      render();
    });

    // ----- FLAGGING -----
    const FLAG_URL = "/.netlify/functions/flag-lead";
    const LAST_NAME_KEY = "hotLeadsDashboard_flaggedBy";
    const dialog = document.getElementById("flag-dialog");
    const titleEl = document.getElementById("flag-dialog-title");
    const nameEl = document.getElementById("flag-dialog-name");
    const whoEl = document.getElementById("flag-who");
    const noteEl = document.getElementById("flag-note");
    const confirmBtn = document.getElementById("flag-confirm");
    const cancelBtn = document.getElementById("flag-cancel");
    let pendingFlag = null;

    // Restore last-used name so users don't retype every time.
    try { whoEl.value = localStorage.getItem(LAST_NAME_KEY) || ""; } catch {}

    document.getElementById("tbody").addEventListener("click", e => {
      const btn = e.target.closest(".flag-btn");
      if (!btn) return;
      pendingFlag = {
        contactId: btn.dataset.contactId,
        action: btn.dataset.action,
        name: btn.dataset.name,
      };
      titleEl.textContent = pendingFlag.action === "flag" ? "Flag as hot lead" : "Remove hot lead flag";
      nameEl.textContent = pendingFlag.name;
      confirmBtn.textContent = pendingFlag.action === "flag" ? "Flag" : "Unflag";
      noteEl.style.display = pendingFlag.action === "flag" ? "" : "none";
      dialog.showModal();
    });

    cancelBtn.addEventListener("click", () => dialog.close());

    document.getElementById("flag-form").addEventListener("submit", async e => {
      e.preventDefault();
      if (!pendingFlag) return;
      const flaggedBy = whoEl.value.trim();
      if (!flaggedBy) { whoEl.focus(); return; }
      try { localStorage.setItem(LAST_NAME_KEY, flaggedBy); } catch {}
      confirmBtn.disabled = true;
      confirmBtn.textContent = "Saving…";
      try {
        const res = await fetch(FLAG_URL, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            contactId: pendingFlag.contactId,
            action: pendingFlag.action,
            note: noteEl.value.trim(),
            flaggedBy,
          }),
        });
        if (!res.ok) throw new Error(await res.text());
        dialog.close();
        noteEl.value = "";
        await load();
      } catch (err) {
        alert("Flag failed: " + err.message);
      } finally {
        confirmBtn.disabled = false;
        confirmBtn.textContent = pendingFlag.action === "flag" ? "Flag" : "Unflag";
      }
    });

    load();
    // Also refresh silently every 10 minutes in case the user leaves this tab open.
    setInterval(load, 10 * 60 * 1000);
  </script>
</body>
</html>
