<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pipeline · Pacific Discovery</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #0b1220;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --ok: #22c55e;
      --danger: #ef4444;
      --row-alt: #16223a;
      --edit: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }
    .wrap { max-width: 100%; margin: 0 auto; padding: 18px 22px 56px; }
    a.back { color: var(--muted); font-size: 13px; text-decoration: none; }
    a.back:hover { color: var(--text); }
    header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin: 8px 0 14px; }
    h1 { font-size: 21px; margin: 0; letter-spacing: -0.01em; display: flex; align-items: baseline; gap: 10px; }
    h1 .tab-name { color: var(--accent); }
    .meta { font-size: 12.5px; color: var(--muted); }
    .meta a { color: #93c5fd; text-decoration: none; }
    .meta a:hover { text-decoration: underline; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
    .toolbar input[type=search] {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-size: 14px; min-width: 240px;
    }
    .btn {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: var(--accent); color: #1a1206; border-color: var(--accent); font-weight: 600; }
    .spacer { flex: 1 1 auto; }
    .save-state { font-size: 12.5px; color: var(--muted); min-width: 120px; text-align: right; }
    .save-state.saving { color: var(--accent); }
    .save-state.saved { color: var(--ok); }
    .save-state.err { color: var(--danger); }

    .filterbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .filter-pill { display: flex; flex-direction: column; gap: 2px; }
    .filter-pill label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); padding-left: 2px; }
    .filter-pill select {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 8px; font: inherit; font-size: 12.5px; color-scheme: dark; max-width: 200px;
    }
    .filter-pill select.active { border-color: var(--accent); color: var(--accent); }

    .table-scroll { overflow: auto; border: 1px solid var(--border); border-radius: 10px; max-height: calc(100vh - 230px); position: relative; }
    table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; background: var(--panel); font-variant-numeric: tabular-nums; }
    thead th {
      position: sticky; top: 0; z-index: 3;
      background: var(--panel-2); color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em;
      font-size: 10.5px; font-weight: 700; text-align: left; padding: 9px 10px;
      border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    thead th:hover { color: var(--text); }
    thead th .sort { opacity: 0.35; margin-left: 4px; font-size: 9px; }
    thead th.sorted .sort { opacity: 1; color: var(--accent); }
    th.rownum, td.rownum {
      position: sticky; left: 0; z-index: 2;
      background: var(--panel-2); color: var(--muted); text-align: right; min-width: 42px; width: 42px;
      font-size: 11px; font-weight: 600; border-right: 1px solid var(--border); padding: 6px 8px;
    }
    thead th.rownum { z-index: 4; }
    tbody td {
      padding: 6px 10px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
      font-size: 13px; vertical-align: top; max-width: 360px; white-space: pre-wrap; word-break: break-word;
      cursor: text;
    }
    tbody tr:nth-child(even) td:not(.rownum) { background: var(--row-alt); }
    tbody tr:hover td:not(.rownum) { background: rgba(245,158,11,0.06); }
    td.editing { padding: 0; }
    td.editing textarea {
      width: 100%; min-width: 140px; min-height: 100%; border: 2px solid var(--edit); outline: none;
      background: #0b1426; color: var(--text); font: inherit; font-size: 13px; padding: 5px 9px; resize: both; display: block;
    }
    td.saving { box-shadow: inset 0 0 0 2px var(--accent); }
    td.saved { box-shadow: inset 0 0 0 2px var(--ok); }
    td.err { box-shadow: inset 0 0 0 2px var(--danger); }
    td.empty-cell { color: #475569; }

    .hint { font-size: 12px; color: var(--muted); margin: 0 0 10px; }
    .count { font-size: 12.5px; color: var(--muted); }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .error-box { background: rgba(239,68,68,0.12); border: 1px solid var(--danger); color: #fecaca; padding: 12px 16px; border-radius: 8px; margin-bottom: 14px; font-size: 13.5px; }
    .error-box code { background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 4px; }
    .loading { color: var(--muted); font-style: italic; padding: 40px 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← Back to dashboard</a>
    <header>
      <div>
        <h1>Pipeline <span class="tab-name" id="tab-name">…</span></h1>
        <div class="meta" id="meta">Loading…</div>
      </div>
      <div class="save-state" id="save-state"></div>
    </header>

    <div id="error" class="error-box" hidden></div>

    <div class="toolbar">
      <input id="q" type="search" placeholder="Search all cells…" autocomplete="off" />
      <button class="btn" id="clear-filters" title="Clear search and all column filters">Clear filters</button>
      <button class="btn" id="add-row">+ Add row</button>
      <span class="spacer"></span>
      <span class="count" id="count"></span>
      <button class="btn" id="reload">↻ Reload</button>
    </div>

    <div class="filterbar" id="filterbar"></div>
    <p class="hint" id="hint" hidden>Double-click any cell to edit. Press Enter to save to the Google Sheet, Esc to cancel.</p>

    <div class="table-scroll" id="table-scroll">
      <div class="loading" id="loading">Loading sheet…</div>
      <table id="grid" hidden>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API = "/api/pipeline-sheet";
    const SHEET_URL_BASE = "https://docs.google.com/spreadsheets/d/";

    // ---- state ----
    let STATE = {
      spreadsheetId: null,
      gid: null,
      title: "",
      tabs: [],
      headers: [],     // header labels (sheet row 1)
      ncols: 0,
      rows: [],        // [{ sheetRow:Number, cells:[String,...] }]
      sort: { col: -1, dir: 0 }, // dir: 0 none, 1 asc, -1 desc
      filters: {},     // colIndex -> selected value ("" = all)
      search: "",
    };

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? "" : s);

    function setSave(text, cls) {
      const el = $("save-state");
      el.textContent = text || "";
      el.className = "save-state" + (cls ? " " + cls : "");
    }

    function showError(msg, hint) {
      const el = $("error");
      el.hidden = false;
      el.innerHTML = `<strong>Couldn't reach the sheet.</strong> ${esc(msg)}` +
        (hint ? `<br><span style="opacity:.85">${hint}</span>` : "");
    }
    function clearError() { $("error").hidden = true; }

    // ---- load ----
    async function load() {
      $("loading").hidden = false;
      $("loading").textContent = "Loading sheet…";
      $("grid").hidden = true;
      clearError();
      try {
        const res = await fetch(`${API}?action=read`, { cache: "no-store" });
        const data = await res.json();
        if (!res.ok) {
          throw Object.assign(new Error(data.error || `HTTP ${res.status}`), { status: res.status });
        }
        ingest(data);
        buildFilters();
        render();
        $("loading").hidden = true;
        $("grid").hidden = false;
        $("hint").hidden = false;
      } catch (err) {
        $("loading").hidden = true;
        let hint = "";
        if (err.status === 403) {
          hint = "The service account doesn't have access to this sheet. Share the spreadsheet with your service-account email (the <code>client_email</code> in GOOGLE_SERVICE_ACCOUNT_JSON) as an <b>Editor</b>.";
        } else if (/GOOGLE_SERVICE_ACCOUNT_JSON/.test(err.message)) {
          hint = "Set the <code>GOOGLE_SERVICE_ACCOUNT_JSON</code> environment variable in Netlify.";
        }
        showError(err.message, hint);
      }
    }

    function ingest(data) {
      STATE.spreadsheetId = data.spreadsheetId;
      STATE.gid = data.gid;
      STATE.title = data.title || "";
      STATE.tabs = data.tabs || [];
      const values = Array.isArray(data.values) ? data.values : [];
      const ncols = values.reduce((m, r) => Math.max(m, r.length), 0) || 1;
      STATE.ncols = ncols;
      const header = values[0] || [];
      STATE.headers = Array.from({ length: ncols }, (_, j) => esc(header[j]).trim());
      STATE.rows = values.slice(1).map((r, i) => ({
        sheetRow: i + 2, // sheet row 1 is the header
        cells: Array.from({ length: ncols }, (_, j) => esc(r[j])),
      }));
      // header labels: fall back to column letter if blank
      STATE.headers = STATE.headers.map((h, j) => h || colLetter(j + 1));

      $("tab-name").textContent = STATE.title ? "· " + STATE.title : "";
      const url = `${SHEET_URL_BASE}${STATE.spreadsheetId}/edit#gid=${STATE.gid}`;
      $("meta").innerHTML =
        `${STATE.rows.length} rows · ${ncols} columns · ` +
        `<a href="${url}" target="_blank" rel="noopener">Open in Google Sheets ↗</a> · ` +
        `loaded ${new Date().toLocaleTimeString()}`;
    }

    function colLetter(n) {
      let s = "";
      while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - 1) / 26); }
      return s;
    }

    // ---- column filters (auto for low-cardinality columns) ----
    function buildFilters() {
      const bar = $("filterbar");
      bar.innerHTML = "";
      STATE.headers.forEach((h, j) => {
        const distinct = new Set();
        for (const r of STATE.rows) {
          const v = (r.cells[j] || "").trim();
          if (v) distinct.add(v);
          if (distinct.size > 30) break;
        }
        if (distinct.size === 0 || distinct.size > 30) return; // skip free-text / empty columns
        const pill = document.createElement("div");
        pill.className = "filter-pill";
        const label = document.createElement("label");
        label.textContent = h;
        const sel = document.createElement("select");
        sel.dataset.col = j;
        sel.innerHTML = `<option value="">All</option>` +
          [...distinct].sort((a, b) => a.localeCompare(b))
            .map(v => `<option value="${v.replace(/"/g, "&quot;")}">${v}</option>`).join("");
        sel.addEventListener("change", () => {
          STATE.filters[j] = sel.value;
          sel.classList.toggle("active", !!sel.value);
          render();
        });
        pill.appendChild(label);
        pill.appendChild(sel);
        bar.appendChild(pill);
      });
    }

    // ---- filtering + sorting ----
    function visibleRows() {
      const q = STATE.search.trim().toLowerCase();
      let rows = STATE.rows.filter(r => {
        for (const [col, val] of Object.entries(STATE.filters)) {
          if (val && (r.cells[col] || "").trim() !== val) return false;
        }
        if (q) {
          const hay = r.cells.join("  ").toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      if (STATE.sort.dir !== 0 && STATE.sort.col >= 0) {
        const c = STATE.sort.col, dir = STATE.sort.dir;
        rows = rows.slice().sort((a, b) => {
          const av = (a.cells[c] || ""), bv = (b.cells[c] || "");
          const an = parseFloat(av.replace(/[^0-9.\-]/g, "")), bn = parseFloat(bv.replace(/[^0-9.\-]/g, ""));
          let cmp;
          if (!isNaN(an) && !isNaN(bn) && av.trim() !== "" && bv.trim() !== "") cmp = an - bn;
          else cmp = av.localeCompare(bv, undefined, { numeric: true, sensitivity: "base" });
          return cmp * dir;
        });
      }
      return rows;
    }

    // ---- render ----
    function render() {
      const thead = $("thead");
      thead.innerHTML = "";
      const tr = document.createElement("tr");
      const corner = document.createElement("th");
      corner.className = "rownum";
      corner.textContent = "#";
      corner.style.cursor = "default";
      tr.appendChild(corner);
      STATE.headers.forEach((h, j) => {
        const th = document.createElement("th");
        const sorted = STATE.sort.col === j && STATE.sort.dir !== 0;
        th.className = sorted ? "sorted" : "";
        const arrow = sorted ? (STATE.sort.dir === 1 ? "▲" : "▼") : "↕";
        th.innerHTML = `${esc(h)} <span class="sort">${arrow}</span>`;
        th.title = "Click to sort";
        th.addEventListener("click", () => {
          if (STATE.sort.col !== j) { STATE.sort.col = j; STATE.sort.dir = 1; }
          else { STATE.sort.dir = STATE.sort.dir === 1 ? -1 : STATE.sort.dir === -1 ? 0 : 1; }
          render();
        });
        tr.appendChild(th);
      });
      thead.appendChild(tr);

      const tbody = $("tbody");
      tbody.innerHTML = "";
      const rows = visibleRows();
      const frag = document.createDocumentFragment();
      for (const r of rows) {
        const rtr = document.createElement("tr");
        const rn = document.createElement("td");
        rn.className = "rownum";
        rn.textContent = r.sheetRow;
        rtr.appendChild(rn);
        for (let j = 0; j < STATE.ncols; j++) {
          const td = document.createElement("td");
          const val = r.cells[j] || "";
          if (!val) td.classList.add("empty-cell");
          td.textContent = val;
          td.dataset.row = r.sheetRow;
          td.dataset.col = j;
          td.addEventListener("dblclick", () => beginEdit(td, r, j));
          rtr.appendChild(td);
        }
        frag.appendChild(rtr);
      }
      tbody.appendChild(frag);

      const total = STATE.rows.length;
      $("count").textContent = rows.length === total
        ? `${total} rows`
        : `${rows.length} of ${total} rows`;

      if (rows.length === 0) {
        const trEmpty = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = STATE.ncols + 1;
        td.className = "empty";
        td.textContent = total === 0 ? "This tab is empty." : "No rows match the current filters.";
        trEmpty.appendChild(td);
        tbody.appendChild(trEmpty);
      }
    }

    // ---- inline editing ----
    function beginEdit(td, rowObj, colIndex) {
      if (td.classList.contains("editing")) return;
      const original = rowObj.cells[colIndex] || "";
      td.classList.add("editing");
      td.classList.remove("empty-cell", "saved", "err");
      td.textContent = "";
      const ta = document.createElement("textarea");
      ta.value = original;
      ta.rows = Math.min(8, Math.max(1, original.split("\n").length));
      td.appendChild(ta);
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);

      let done = false;
      const finish = (commit) => {
        if (done) return; done = true;
        const newVal = ta.value;
        td.classList.remove("editing");
        if (!commit || newVal === original) {
          td.textContent = original;
          if (!original) td.classList.add("empty-cell");
          return;
        }
        td.textContent = newVal;
        if (!newVal) td.classList.add("empty-cell");
        save(td, rowObj, colIndex, newVal, original);
      };

      ta.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); finish(true); }
        else if (e.key === "Escape") { e.preventDefault(); finish(false); }
      });
      ta.addEventListener("blur", () => finish(true));
    }

    async function save(td, rowObj, colIndex, newVal, original) {
      td.classList.add("saving");
      setSave("Saving…", "saving");
      try {
        const res = await fetch(`${API}?action=update`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            gid: STATE.gid,
            title: STATE.title,
            row: rowObj.sheetRow,
            col: colIndex + 1,
            value: newVal,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw Object.assign(new Error(data.error || `HTTP ${res.status}`), { status: res.status });
        rowObj.cells[colIndex] = newVal;
        td.classList.remove("saving");
        td.classList.add("saved");
        setSave("Saved ✓", "saved");
        setTimeout(() => { td.classList.remove("saved"); }, 1400);
        setTimeout(() => { if ($("save-state").textContent === "Saved ✓") setSave(""); }, 2500);
      } catch (err) {
        td.classList.remove("saving");
        td.classList.add("err");
        rowObj.cells[colIndex] = original;
        td.textContent = original;
        if (!original) td.classList.add("empty-cell");
        setSave("Save failed — not written", "err");
        if (err.status === 403) {
          showError(err.message,
            "Writes require the sheet shared with the service account as an <b>Editor</b>.");
        }
        setTimeout(() => td.classList.remove("err"), 2500);
      }
    }

    // ---- add row ----
    function addRow() {
      const maxSheetRow = STATE.rows.reduce((m, r) => Math.max(m, r.sheetRow), 1);
      STATE.rows.push({
        sheetRow: maxSheetRow + 1,
        cells: Array.from({ length: STATE.ncols }, () => ""),
      });
      // clear filters/search so the new (empty) row is visible
      STATE.search = ""; $("q").value = "";
      STATE.filters = {};
      document.querySelectorAll("#filterbar select").forEach(s => { s.value = ""; s.classList.remove("active"); });
      render();
      const scroll = $("table-scroll");
      scroll.scrollTop = scroll.scrollHeight;
      setSave("New row added — fill a cell to write it to the sheet", "");
    }

    // ---- events ----
    $("q").addEventListener("input", (e) => { STATE.search = e.target.value; render(); });
    $("reload").addEventListener("click", load);
    $("add-row").addEventListener("click", addRow);
    $("clear-filters").addEventListener("click", () => {
      STATE.search = ""; $("q").value = "";
      STATE.filters = {};
      STATE.sort = { col: -1, dir: 0 };
      document.querySelectorAll("#filterbar select").forEach(s => { s.value = ""; s.classList.remove("active"); });
      render();
    });

    load();
  </script>
</body>
</html>
