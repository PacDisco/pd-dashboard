<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cashflow Forecast Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f7fb;
    --surface: #ffffff;
    --border: #e4e8ef;
    --muted: #6b7280;
    --text: #111827;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --danger: #dc2626;
    --good: #059669;
    --shadow: 0 1px 2px rgba(15,23,42,0.05), 0 4px 12px rgba(15,23,42,0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 20px 32px; display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  header h1 { font-size: 22px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .back { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 500; }
  .back:hover { text-decoration: underline; }

  .controls-wrap {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 18px 32px;
  }
  .controls-row {
    display: grid; gap: 16px; align-items: end;
  }
  .controls-row.primary {
    grid-template-columns: minmax(280px, 2fr) minmax(180px, 1fr) auto;
  }
  .controls-row.secondary {
    grid-template-columns: 1fr 1fr;
    margin-top: 14px;
    align-items: start;
  }
  .field > .fieldlabel {
    display: block; font-size: 11px; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .field > .fieldlabel .count {
    display: inline-block; background: var(--accent-soft); color: var(--accent);
    font-weight: 600; border-radius: 999px; padding: 1px 7px; margin-left: 6px;
    font-size: 10px; letter-spacing: 0;
  }
  .field select {
    width: 100%; padding: 9px 11px; border: 1px solid var(--border);
    border-radius: 7px; background: #fff; font-size: 14px; color: var(--text);
    font-family: inherit;
  }
  .field select:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
  .hint { color: var(--muted); font-size: 12px; margin-top: 6px; min-height: 16px; }

  .multi-box {
    border: 1px solid var(--border); border-radius: 7px; background: #fff;
    max-height: 180px; overflow-y: auto; padding: 4px;
  }
  .multi-box .search-wrap { padding: 4px 4px 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .multi-box .search-wrap input {
    width: 100%; padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 5px; font-size: 13px; font-family: inherit;
  }
  .multi-box .search-wrap input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }

  .multi-row {
    display: flex; align-items: center;
    padding: 6px 8px; border-radius: 5px; cursor: pointer; font-size: 13px;
    line-height: 1.35;
  }
  .multi-row:hover { background: var(--accent-soft); }
  .multi-row input[type="checkbox"] {
    margin: 0 10px 0 0; cursor: pointer; flex-shrink: 0;
    width: 14px; height: 14px;
  }
  .multi-row.disabled { opacity: 0.4; cursor: not-allowed; }
  .multi-row.disabled:hover { background: transparent; }
  .multi-row .label {
    flex: 1 1 auto; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .multi-row .meta {
    color: var(--muted); font-size: 11px; margin-left: 10px; flex-shrink: 0;
  }
  .multi-group-label {
    font-size: 10px; color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 8px 8px 4px; margin-top: 4px;
    border-top: 1px solid var(--border);
  }
  .multi-group-label:first-child { border-top: none; margin-top: 0; }

  button {
    padding: 9px 16px; border: 1px solid var(--border); border-radius: 7px;
    background: #fff; cursor: pointer; font-size: 14px; color: var(--text);
    white-space: nowrap; font-weight: 500;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button:hover { filter: brightness(0.97); }
  button[disabled] { opacity: 0.5; cursor: not-allowed; }

  .status {
    padding: 10px 32px; font-size: 13px; color: var(--muted);
    background: #fafbfc; border-bottom: 1px solid var(--border);
  }
  .status.error { color: var(--danger); background: #fef2f2; }

  .chips-bar {
    padding: 10px 32px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .chips-bar .chips-label {
    font-size: 11px; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px 4px 10px; background: var(--accent-soft); color: var(--accent);
    border-radius: 999px; font-size: 12px; font-weight: 500;
  }
  .chip button {
    all: unset; cursor: pointer; width: 16px; height: 16px; line-height: 14px;
    text-align: center; border-radius: 50%; color: var(--accent); font-size: 14px;
  }
  .chip button:hover { background: rgba(37, 99, 235, 0.2); }

  main { padding: 24px 28px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow); margin-bottom: 20px;
    overflow: hidden;
  }
  .card-header {
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    font-weight: 600;
  }
  .card-header .meta { font-weight: 400; color: var(--muted); font-size: 12px; }
  .card-body { padding: 0; overflow-x: auto; }

  table.cashflow {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  table.cashflow th, table.cashflow td {
    border-bottom: 1px solid var(--border); padding: 7px 10px; text-align: right;
    white-space: nowrap;
  }
  table.cashflow th:first-child, table.cashflow td:first-child {
    text-align: left; position: sticky; left: 0; background: var(--surface);
    font-weight: 500; z-index: 1;
  }
  table.cashflow thead th {
    background: #f8fafc; font-weight: 600; font-size: 12px;
    text-transform: uppercase; color: var(--muted); letter-spacing: 0.04em;
    position: sticky; top: 0; z-index: 2;
  }
  table.cashflow thead th:first-child { z-index: 3; }
  table.cashflow tr.section td {
    background: #f1f5f9; font-weight: 600; color: var(--text); cursor: pointer;
    user-select: none;
  }
  table.cashflow tr.section td:first-child::before {
    content: "▾ "; color: var(--muted); display: inline-block; width: 14px;
    transition: transform 0.15s;
  }
  table.cashflow tr.section.collapsed td:first-child::before {
    content: "▸ ";
  }
  table.cashflow tr.collapsed-row { display: none; }
  table.cashflow td.neg { color: var(--danger); }
  table.cashflow td.pos { color: var(--good); }
  table.cashflow td.delta-pos { color: var(--good); font-weight: 500; }
  table.cashflow td.delta-neg { color: var(--danger); font-weight: 500; }

  .compare-grid { display: grid; gap: 20px; grid-template-columns: 1fr; }
  @media (min-width: 1100px) { .compare-grid.cols-2 { grid-template-columns: 1fr 1fr; } }

  .chart-wrap { padding: 18px; }
  .chart-wrap canvas { width: 100% !important; height: 380px !important; }

  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-size: 12px;
    font-weight: 500; margin-left: 8px;
  }
  .pill.variance {
    background: #fef3c7; color: #92400e;
  }

  .empty { padding: 40px; text-align: center; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Cashflow Forecast Dashboard</h1>
    <div class="sub">Live from Google Drive — latest files appear automatically on load.</div>
  </div>
  <a class="back" href="/">&larr; All dashboards</a>
</header>

<div class="controls-wrap">
  <div class="controls-row primary">
    <div class="field">
      <label class="fieldlabel" for="versionSelect">Version</label>
      <select id="versionSelect"></select>
      <div class="hint" id="versionHint">&nbsp;</div>
    </div>
    <div class="field">
      <label class="fieldlabel" for="tabSelect">Sheet / Tab</label>
      <select id="tabSelect"></select>
      <div class="hint">&nbsp;</div>
    </div>
    <div class="field">
      <button id="refreshBtn" class="primary" title="Re-fetch file list and reload">↻ Refresh</button>
    </div>
  </div>
  <div class="controls-row secondary">
    <div class="field">
      <span class="fieldlabel">Compare with <span class="count" id="compareCount" hidden>0</span></span>
      <div id="compareList" class="multi-box">
        <div class="search-wrap"><input id="compareSearch" type="search" placeholder="Filter versions…" /></div>
        <div id="compareListInner"></div>
      </div>
    </div>
    <div class="field">
      <span class="fieldlabel">Chart rows <span class="count" id="chartRowsCount" hidden>0</span></span>
      <div id="chartRowsList" class="multi-box"></div>
    </div>
  </div>
</div>

<div id="chipsBar" class="chips-bar" hidden></div>
<div id="status" class="status">Loading…</div>

<main id="main"></main>

<script>
/* ========================================================================= *
 *  CONFIG
 * ========================================================================= */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5pwmLqNGqPbNEWqoWT2iIqByVlLn-K7G-iezI6CBShc-p31UIWsMBGdj1T2tWzS5n/exec";

/* ========================================================================= *
 *  STATE
 * ========================================================================= */
const state = {
  forecasts: [],          // [{id, name, folderPath, modifiedTime, mimeType}]
  selectedId: null,       // primary version id
  selectedTab: null,      // tab name (applies to primary + compare)
  compareIds: [],         // ids of compare versions (primary excluded)
  chartRowIndices: [],    // indices (into primary tab's rows) the user wants charted
  userPickedChartRows: false,  // once true, we stop auto-picking on tab change
  cache: new Map(),       // fileId -> full forecast payload
  currentChart: null      // Chart.js instance (destroyed on re-render)
};

/* ========================================================================= *
 *  API
 * ========================================================================= */
async function api(params, attempt) {
  attempt = attempt || 0;
  const maxAttempts = 3;
  const url = new URL(APPS_SCRIPT_URL);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  try {
    const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Unknown API error');
    return json.data;
  } catch (err) {
    const msg = String(err && err.message || err);
    const transient = /Service error|HTTP 5\d\d|Failed to fetch|NetworkError/i.test(msg);
    if (transient && attempt < maxAttempts - 1) {
      const delay = 750 * Math.pow(2, attempt);
      setStatus(`Transient error, retrying in ${delay}ms…  (${msg})`, false);
      await new Promise(r => setTimeout(r, delay));
      return api(params, attempt + 1);
    }
    throw err;
  }
}
async function fetchList() { return api({ action: 'list' }); }
async function fetchForecast(fileId) {
  if (state.cache.has(fileId)) return state.cache.get(fileId);
  const data = await api({ action: 'get', fileId });
  state.cache.set(fileId, data);
  return data;
}

/* ========================================================================= *
 *  UI – CONTROLS
 * ========================================================================= */
function groupForecastsByFolder(forecasts) {
  const groups = new Map();
  forecasts.forEach(f => {
    const key = f.folderPath || '(root)';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(f);
  });
  // Sort groups: FY26/27 style paths first, alphabetical otherwise.
  const entries = Array.from(groups.entries());
  entries.sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
  return entries;
}

function buildVersionDropdown() {
  const vs = document.getElementById('versionSelect');
  vs.innerHTML = '';
  groupForecastsByFolder(state.forecasts).forEach(([folder, list]) => {
    const og = document.createElement('optgroup');
    og.label = folder;
    // within a group, newest first
    list.sort((a, b) => b.modifiedTime.localeCompare(a.modifiedTime));
    list.forEach(f => {
      const o = document.createElement('option');
      o.value = f.id;
      o.textContent = cleanName(f.name) + '  —  ' + formatDate(f.modifiedTime);
      og.appendChild(o);
    });
    vs.appendChild(og);
  });
  vs.value = state.selectedId;
  updateVersionHint();
}

function buildCompareList() {
  const inner = document.getElementById('compareListInner');
  inner.innerHTML = '';
  const filter = (document.getElementById('compareSearch').value || '').trim().toLowerCase();
  groupForecastsByFolder(state.forecasts).forEach(([folder, forecasts]) => {
    forecasts.sort((a, b) => b.modifiedTime.localeCompare(a.modifiedTime));
    const matches = forecasts.filter(f =>
      !filter ||
      cleanName(f.name).toLowerCase().includes(filter) ||
      folder.toLowerCase().includes(filter));
    if (!matches.length) return;

    const gl = document.createElement('div');
    gl.className = 'multi-group-label';
    gl.textContent = folder;
    inner.appendChild(gl);

    matches.forEach(f => {
      const row = document.createElement('label');
      row.className = 'multi-row';
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.value = f.id;
      cb.checked = state.compareIds.includes(f.id);
      cb.addEventListener('change', onCompareChange);
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = cleanName(f.name);
      label.title = cleanName(f.name);
      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = formatDate(f.modifiedTime, true);
      row.appendChild(cb);
      row.appendChild(label);
      row.appendChild(meta);
      if (f.id === state.selectedId) {
        row.classList.add('disabled');
        cb.disabled = true; cb.checked = false;
        row.title = 'This is the primary version';
      }
      inner.appendChild(row);
    });
  });
  updateCompareCount();
}

function updateCompareCount() {
  const n = state.compareIds.length;
  const el = document.getElementById('compareCount');
  el.textContent = n;
  el.hidden = n === 0;
}
function updateChartRowsCount() {
  const n = state.chartRowIndices.length;
  const el = document.getElementById('chartRowsCount');
  el.textContent = n;
  el.hidden = n === 0;
}

function renderChipsBar() {
  const bar = document.getElementById('chipsBar');
  bar.innerHTML = '';
  if (!state.compareIds.length) {
    bar.hidden = true;
    return;
  }
  bar.hidden = false;
  const lbl = document.createElement('span');
  lbl.className = 'chips-label';
  lbl.textContent = 'Comparing with:';
  bar.appendChild(lbl);
  state.compareIds.forEach(id => {
    const f = state.forecasts.find(x => x.id === id);
    if (!f) return;
    const chip = document.createElement('span');
    chip.className = 'chip';
    const txt = document.createElement('span');
    txt.textContent = cleanName(f.name);
    const btn = document.createElement('button');
    btn.textContent = '×';
    btn.title = 'Remove from compare';
    btn.addEventListener('click', () => {
      state.compareIds = state.compareIds.filter(x => x !== id);
      buildCompareList();
      render();
    });
    chip.appendChild(txt);
    chip.appendChild(btn);
    bar.appendChild(chip);
  });
}

function buildTabDropdown(forecast) {
  const ts = document.getElementById('tabSelect');
  ts.innerHTML = '';
  forecast.tabs.forEach(t => {
    const o = document.createElement('option');
    o.value = t.name; o.textContent = t.name;
    ts.appendChild(o);
  });
  if (state.selectedTab && forecast.tabs.some(t => t.name === state.selectedTab)) {
    ts.value = state.selectedTab;
  } else {
    ts.value = forecast.tabs[0].name;
    state.selectedTab = ts.value;
  }
}

function buildChartRowsList(primaryForecast) {
  const box = document.getElementById('chartRowsList');
  box.innerHTML = '';
  const tab = primaryForecast.tabs.find(t => t.name === state.selectedTab) || primaryForecast.tabs[0];
  const raw = tab.raw || tab.values;

  // Which row indices are numeric and have a label?
  const candidates = [];
  for (let i = 1; i < raw.length; i++) {
    const label = String(raw[i][0] || '').trim();
    if (!label) continue;
    const hasNumeric = raw[i].slice(1).some(c => parseLikelyNumber(c) !== null);
    if (hasNumeric) candidates.push({ index: i, label });
  }

  if (!candidates.length) {
    box.innerHTML = '<div class="empty" style="padding:14px">No numeric rows found in this tab.</div>';
    state.chartRowIndices = [];
    return;
  }

  // If the user hasn't picked manually, auto-select a best default.
  if (!state.userPickedChartRows) {
    const rx = /(ending balance|net cash ?flow|cash ?flow|^balance$|^net$)/i;
    const hit = candidates.find(c => rx.test(c.label));
    state.chartRowIndices = hit ? [hit.index] : [candidates[candidates.length - 1].index];
  } else {
    // Drop any row indices that no longer exist in the new tab
    state.chartRowIndices = state.chartRowIndices.filter(i =>
      candidates.some(c => c.index === i));
    if (!state.chartRowIndices.length && candidates.length) {
      state.chartRowIndices = [candidates[candidates.length - 1].index];
    }
  }

  candidates.forEach(c => {
    const row = document.createElement('label');
    row.className = 'multi-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.value = String(c.index);
    cb.checked = state.chartRowIndices.includes(c.index);
    cb.addEventListener('change', onChartRowsChange);
    const label = document.createElement('span');
    label.className = 'label'; label.textContent = c.label;
    row.appendChild(cb); row.appendChild(label);
    box.appendChild(row);
  });
}

function updateVersionHint() {
  const f = state.forecasts.find(x => x.id === state.selectedId);
  document.getElementById('versionHint').textContent =
    f ? ('Modified ' + formatDate(f.modifiedTime) + '  •  ' + state.forecasts.length + ' total versions') : '';
}

/* ========================================================================= *
 *  RENDER
 * ========================================================================= */
function clearMain() {
  if (state.currentChart) { state.currentChart.destroy(); state.currentChart = null; }
  document.getElementById('main').innerHTML = '';
}

function renderForecastCard(forecast, tabName, extraPillClass) {
  const tab = forecast.tabs.find(t => t.name === tabName) || forecast.tabs[0];
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div>${escapeHtml(cleanName(forecast.name))} <span class="pill ${extraPillClass||''}">${escapeHtml(tab.name)}</span></div>
      <div class="meta">${tab.rows} rows × ${tab.cols} cols</div>
    </div>
    <div class="card-body"></div>
  `;
  card.querySelector('.card-body').appendChild(buildTable(tab.values, tab.raw));
  return card;
}

/**
 * Build the main cashflow table. Detects "section" rows (column A has text, all
 * other columns empty) and makes them click-to-collapse.
 */
function buildTable(values, raw) {
  const table = document.createElement('table');
  table.className = 'cashflow';
  if (!values || !values.length) {
    table.innerHTML = '<tbody><tr><td class="empty">No data in this tab.</td></tr></tbody>';
    return table;
  }
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  values[0].forEach(cell => {
    const th = document.createElement('th');
    th.textContent = cell;
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  // Track which section each row belongs to, so collapsing one hides all its
  // children (and un-hides on toggle).
  let currentSection = null;
  const sectionBuckets = new Map(); // sectionKey -> [tr...]

  for (let i = 1; i < values.length; i++) {
    const row = values[i];
    const rawRow = raw ? raw[i] : row;
    const first = String(row[0] || '').trim();
    const restEmpty = row.slice(1).every(c => c === '' || c == null);
    const tr = document.createElement('tr');

    if (first && restEmpty) {
      // Section header — entire row labels, no data
      const secKey = 's' + i;
      currentSection = secKey;
      sectionBuckets.set(secKey, []);
      tr.className = 'section';
      tr.dataset.sectionKey = secKey;
      tr.addEventListener('click', () => toggleSection(tr, sectionBuckets.get(secKey)));

      row.forEach((cell, j) => {
        const td = document.createElement('td');
        if (j === 0) td.colSpan = row.length;
        td.textContent = cell == null ? '' : cell;
        if (j === 0) tr.appendChild(td);
      });
    } else {
      row.forEach((cell, j) => {
        const td = document.createElement('td');
        td.textContent = cell == null ? '' : cell;
        if (j > 0) {
          const n = parseLikelyNumber(cell);
          if (n !== null) {
            if (n < 0) td.classList.add('neg');
            else if (n > 0 && /balance|net|total/i.test(first)) td.classList.add('pos');
          }
        }
        tr.appendChild(td);
      });
      if (currentSection) {
        tr.dataset.sectionParent = currentSection;
        sectionBuckets.get(currentSection).push(tr);
      }
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  return table;
}

function toggleSection(headerTr, childRows) {
  const collapsed = headerTr.classList.toggle('collapsed');
  childRows.forEach(tr => tr.classList.toggle('collapsed-row', collapsed));
}

/**
 * Variance table: exactly 2 forecasts (primary + 1 compare). Renders row
 * labels in column A, then "Δ = compare − primary" for every data column.
 */
function buildVarianceCard(primary, other, tabName) {
  const pTab = primary.tabs.find(t => t.name === tabName) || primary.tabs[0];
  const oTab = other.tabs.find(t => t.name === tabName) || other.tabs[0];
  const pRaw = pTab.raw || pTab.values;
  const oRaw = oTab.raw || oTab.values;

  // Index compare rows by label for forgiving alignment.
  const oByLabel = new Map();
  for (let i = 1; i < oRaw.length; i++) {
    const lbl = String(oRaw[i][0] || '').trim();
    if (lbl) oByLabel.set(lbl.toLowerCase(), oRaw[i]);
  }

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div>Variance: <em>${escapeHtml(cleanName(other.name))}</em> minus <em>${escapeHtml(cleanName(primary.name))}</em>
        <span class="pill variance">${escapeHtml(tabName)} · Δ</span></div>
      <div class="meta">Rows aligned by label (column A)</div>
    </div>
    <div class="card-body"></div>
  `;

  const table = document.createElement('table');
  table.className = 'cashflow';
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  pRaw[0].forEach(cell => {
    const th = document.createElement('th');
    th.textContent = cell == null ? '' : cell;
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  for (let i = 1; i < pRaw.length; i++) {
    const pRow = pRaw[i];
    const label = String(pRow[0] || '').trim();
    const restEmpty = pRow.slice(1).every(c => c === '' || c == null);
    const tr = document.createElement('tr');
    if (label && restEmpty) {
      tr.className = 'section';
      const td = document.createElement('td');
      td.colSpan = pRow.length;
      td.textContent = label;
      tr.appendChild(td);
      tbody.appendChild(tr);
      continue;
    }
    const oRow = oByLabel.get(label.toLowerCase()) || [];
    for (let j = 0; j < pRow.length; j++) {
      const td = document.createElement('td');
      if (j === 0) {
        td.textContent = label;
      } else {
        const p = parseLikelyNumber(pRow[j]);
        const o = parseLikelyNumber(oRow[j]);
        if (p === null || o === null) {
          td.textContent = '';
        } else {
          const delta = o - p;
          td.textContent = formatDeltaNumber(delta);
          if (delta > 0) td.classList.add('delta-pos');
          else if (delta < 0) td.classList.add('delta-neg');
        }
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  card.querySelector('.card-body').appendChild(table);
  return card;
}

function renderOverlayChart(forecasts, tabName) {
  if (!state.chartRowIndices.length) return null;

  const primary = forecasts[0];
  const pTab = primary.tabs.find(t => t.name === tabName) || primary.tabs[0];
  const pRaw = pTab.raw || pTab.values;
  const labels = (pRaw[0] || []).slice(1).map(String);

  // Build datasets: one per (forecast, rowIndex) pair.
  const datasets = [];
  let colorIdx = 0;
  state.chartRowIndices.forEach(rowIdx => {
    const rowLabel = String((pRaw[rowIdx] || [])[0] || ('Row ' + rowIdx));
    forecasts.forEach(f => {
      const tab = f.tabs.find(t => t.name === tabName) || f.tabs[0];
      const raw = tab.raw || tab.values;

      // Match by label so compare versions align even if row order shifts slightly
      let r = raw[rowIdx];
      if (!r || String(r[0] || '').trim().toLowerCase() !== rowLabel.trim().toLowerCase()) {
        r = raw.find(x => String(x[0] || '').trim().toLowerCase() === rowLabel.trim().toLowerCase());
      }
      if (!r) return;

      datasets.push({
        label: cleanName(f.name) + ' — ' + rowLabel,
        data: r.slice(1).map(c => parseLikelyNumber(c)),
        borderColor: palette(colorIdx),
        backgroundColor: palette(colorIdx, 0.15),
        tension: 0.25,
        spanGaps: true,
        pointRadius: 3
      });
      colorIdx++;
    });
  });

  if (!datasets.length) return null;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div>Chart <span class="pill">${escapeHtml(tabName)}</span></div>
      <div class="meta">${datasets.length} series · ${state.chartRowIndices.length} row${state.chartRowIndices.length===1?'':'s'} × ${forecasts.length} version${forecasts.length===1?'':'s'}</div>
    </div>
    <div class="chart-wrap"><canvas></canvas></div>
  `;
  const canvas = card.querySelector('canvas');
  state.currentChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'bottom' } },
      scales: { y: { ticks: { callback: v => formatCurrency(v) } } }
    }
  });
  return card;
}

/* ========================================================================= *
 *  ORCHESTRATION
 * ========================================================================= */
async function render() {
  clearMain();
  setStatus('Loading selected version…');
  try {
    const primary = await fetchForecast(state.selectedId);
    buildTabDropdown(primary);
    buildChartRowsList(primary);

    const tabName = state.selectedTab;
    const compareForecasts = await Promise.all(state.compareIds.map(id => fetchForecast(id)));
    const allForecasts = [primary, ...compareForecasts];
    const mainEl = document.getElementById('main');

    const chart = renderOverlayChart(allForecasts, tabName);
    if (chart) mainEl.appendChild(chart);

    const grid = document.createElement('div');
    grid.className = 'compare-grid' + (allForecasts.length === 2 ? ' cols-2' : '');
    allForecasts.forEach(f => grid.appendChild(renderForecastCard(f, tabName)));
    mainEl.appendChild(grid);

    if (compareForecasts.length === 1) {
      mainEl.appendChild(buildVarianceCard(primary, compareForecasts[0], tabName));
    }

    setStatus(
      'Showing ' + cleanName(primary.name) +
      (compareForecasts.length ? '  vs  ' + compareForecasts.map(f => cleanName(f.name)).join(', ') : '') +
      '  •  tab: ' + tabName
    );
  } catch (err) {
    setStatus('Error: ' + err.message, true);
    console.error(err);
  }
}

async function loadFresh() {
  state.cache.clear();
  setStatus('Fetching latest file list from Drive…');
  try {
    const list = await fetchList();
    state.forecasts = list;
    if (!list.length) {
      setStatus('No cashflow workbooks found in the Drive folder (looked for .xlsx, .xls, and Google Sheets, including subfolders).', true);
      clearMain();
      return;
    }
    if (!state.selectedId || !list.some(f => f.id === state.selectedId)) {
      // Default to newest
      const newest = list.slice().sort((a,b) => b.modifiedTime.localeCompare(a.modifiedTime))[0];
      state.selectedId = newest.id;
    }
    state.compareIds = state.compareIds.filter(id => id !== state.selectedId && list.some(f => f.id === id));
    buildVersionDropdown();
    buildCompareList();
    renderChipsBar();
    await render();
  } catch (err) {
    setStatus('Error loading file list: ' + err.message, true);
    console.error(err);
  }
}

/* ========================================================================= *
 *  EVENT HANDLERS
 * ========================================================================= */
document.getElementById('versionSelect').addEventListener('change', async e => {
  state.selectedId = e.target.value;
  state.compareIds = state.compareIds.filter(id => id !== state.selectedId);
  buildCompareList();
  renderChipsBar();
  updateVersionHint();
  await render();
});
document.getElementById('tabSelect').addEventListener('change', async e => {
  state.selectedTab = e.target.value;
  await render();
});
function onCompareChange() {
  const cbs = document.querySelectorAll('#compareListInner input[type=checkbox]');
  state.compareIds = Array.from(cbs).filter(cb => cb.checked && !cb.disabled).map(cb => cb.value);
  updateCompareCount();
  renderChipsBar();
  render();
}
function onChartRowsChange() {
  const cbs = document.querySelectorAll('#chartRowsList input[type=checkbox]');
  state.chartRowIndices = Array.from(cbs).filter(cb => cb.checked).map(cb => parseInt(cb.value, 10));
  state.userPickedChartRows = true;
  updateChartRowsCount();
  render();
}
document.getElementById('refreshBtn').addEventListener('click', () => loadFresh());
document.getElementById('compareSearch').addEventListener('input', () => buildCompareList());

/* ========================================================================= *
 *  HELPERS
 * ========================================================================= */
function setStatus(msg, isError) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status' + (isError ? ' error' : '');
}
function cleanName(name) {
  // Strip trailing .xlsx / .xls / .xlsm and surrounding whitespace
  return String(name || '').replace(/\.(xlsx|xls|xlsm)$/i, '').trim();
}
function formatDate(iso, short) {
  try {
    const d = new Date(iso);
    return d.toLocaleString(undefined, short
      ? { year: '2-digit', month: 'short', day: 'numeric' }
      : { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch { return iso; }
}
function parseLikelyNumber(v) {
  if (v == null || v === '') return null;
  if (typeof v === 'number' && isFinite(v)) return v;
  const s = String(v).trim();
  if (!s) return null;
  let neg = false, str = s;
  if (/^\(.*\)$/.test(str)) { neg = true; str = str.slice(1, -1); }
  str = str.replace(/[,$\s]/g, '').replace(/%$/, '');
  if (str === '' || str === '-' || isNaN(Number(str))) return null;
  return (neg ? -1 : 1) * Number(str);
}
function formatCurrency(v) {
  if (typeof v !== 'number' || !isFinite(v)) return v;
  const abs = Math.abs(v);
  if (abs >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (abs >= 1e3) return (v / 1e3).toFixed(1) + 'k';
  return v.toFixed(0);
}
function formatDeltaNumber(v) {
  if (v === 0) return '0';
  const sign = v > 0 ? '+' : '−';
  const abs = Math.abs(v);
  if (abs >= 1e6) return sign + (abs / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return sign + (abs / 1e3).toFixed(1) + 'k';
  return sign + abs.toFixed(abs < 10 ? 2 : 0);
}
function palette(i, alpha) {
  const colors = [
    [37, 99, 235], [5, 150, 105], [220, 38, 38], [217, 119, 6],
    [139, 92, 246], [14, 165, 233], [236, 72, 153], [16, 185, 129]
  ];
  const c = colors[i % colors.length];
  return alpha != null ? `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${alpha})` : `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
}
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* ========================================================================= *
 *  BOOT
 * ========================================================================= */
(function boot() {
  if (APPS_SCRIPT_URL.startsWith('REPLACE_')) {
    setStatus('Setup needed: open /cashflow/index.html and set APPS_SCRIPT_URL to your deployed Apps Script /exec URL.', true);
    return;
  }
  loadFresh();
})();
</script>
