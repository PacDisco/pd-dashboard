<style>

function getSeasonYears() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const baseYear = month >= 9 ? year + 1 : year;
  return { summer: baseYear, fall: baseYear, spring: baseYear + 1 };
}

// ═══════════════════════════════════════════
// HUBSPOT DATA FETCHER
// ═══════════════════════════════════════════
async function fetchHubSpotData() {
  const resp = await fetch(HUBSPOT_API_URL);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ error: 'Unknown error' }));
    throw new Error(err.error || `API returned ${resp.status}`);
  }
  const apiData = await resp.json();
  return transformHubSpotData(apiData);
}

// Transform HubSpot API response into render-ready format
function transformHubSpotData(apiData) {
  const data = { seasons: {} };

  Object.entries(apiData.seasons).forEach(([seasonKey, seasonData]) => {
    data.seasons[seasonKey] = {
      programs: seasonData.programs.map(p => ({
        name: p.name,
        hubspotName: p.hubspotName || p.name,
        price: p.price,
        maxPax: p.maxPax || 0,
        targetPax: p.targetPax || 0,
        actualPax: p.actualPax || 0,
        estFuture: p.estFuturePax || p.estFuture || 0,
        forecastSales: p.forecastSales || 0,
        totalDeals: p.totalDeals || 0,
        _hubspot: true,
      }))
    };
  });

  return data;
}

// ═══════════════════════════════════════════
// GOOGLE SHEET CLIENT-SIDE FETCH + MERGE
// ═══════════════════════════════════════════
// Fetches sheet data directly from Apps Script and merges with existing data.
// This ensures edits to max_pax, target_pax, est_future_pax always show up.
async function fetchAndMergeSheetData(data) {
  if (!GSHEET_API_URL) return data;
  try {
    const resp = await fetch(GSHEET_API_URL);
    if (!resp.ok) return data;
    const sheetJson = await resp.json();
    if (sheetJson.status !== 'ok' || !sheetJson.seasons) return data;

    // Merge sheet values into existing data
    Object.entries(sheetJson.seasons).forEach(([seasonKey, sheetPrograms]) => {
      if (!data.seasons[seasonKey]) return;
      const programs = data.seasons[seasonKey].programs;

      sheetPrograms.forEach(sp => {
        const match = programs.find(p =>
          (p.hubspotName || p.name) === sp.programKey || p.name === sp.displayName
        );
        if (match) {
          match.maxPax = sp.maxPax;
          match.targetPax = sp.targetPax;
          match.estFuture = sp.estFuturePax || 0;
          match.estFuturePax = sp.estFuturePax || 0;
        } else {
          // Program exists in sheet but not in HubSpot — add it
          programs.push({
            name: sp.displayName,
            hubspotName: sp.programKey,
            price: null,
            maxPax: sp.maxPax,
            targetPax: sp.targetPax,
            actualPax: 0,
            estFuture: sp.estFuturePax || 0,
            forecastSales: 0,
            totalDeals: 0,
          });
        }
      });
    });

    // Recalculate forecast sales after merge
    Object.values(data.seasons).forEach(seasonData => {
      seasonData.programs.forEach(p => {
        const forecastPax = (p.actualPax || 0) + (p.estFuture || 0);
        if (p.price) p.forecastSales = p.price * forecastPax;
      });
    });

    return data;
  } catch (e) {
    console.warn('Sheet merge failed:', e);
    return data;
  }
}

// ═══════════════════════════════════════════
// GOOGLE SHEETS PARSER
// ═══════════════════════════════════════════
async function fetchGoogleSheet(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Could not fetch Google Sheet.');
  const text = await resp.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
  const data = { seasons: { summer: { programs: [] }, fall: { programs: [] }, spring: { programs: [] } } };
  let currentSeason = null;
  for (let i = 0; i < lines.length; i++) {
    const row = lines[i];
    if (!row[0]) continue;
    const title = row[0].trim();
    if (title.includes('Subtotal') || title.includes('Totals')) continue;
    if (title.includes('Fall')) { currentSeason = 'fall'; continue; }
    if (title.includes('Spring')) { currentSeason = 'spring'; continue; }
    if (title === 'Program Title' && !currentSeason) { currentSeason = 'summer'; continue; }
    if (title === 'Program Title') continue;
    if (currentSeason && title) {
      const parseNum = s => { if (!s) return null; const n = parseFloat(s.replace(/[$,]/g, '')); return isNaN(n) ? null : n; };
      const prog = {
        name: title, price: parseNum(row[1]), maxPax: parseNum(row[2]) || 0,
        targetPax: parseNum(row[4]) || 0, actualPax: parseNum(row[6]) || 0,
        estFuture: parseNum(row[7]) || 0, forecastSales: parseNum(row[9]) || 0,
      };
      if (data.seasons[currentSeason]) data.seasons[currentSeason].programs.push(prog);
    }
  }
  return data;
}

// ═══════════════════════════════════════════
// COMPUTATION
// ═══════════════════════════════════════════
function computeSeasonTotals(programs) {
  const t = { maxPax: 0, targetPax: 0, actualPax: 0, forecastPax: 0, forecastSales: 0, targetSales: 0, maxSales: 0 };
  programs.forEach(p => {
    t.maxPax += p.maxPax || 0;
    t.targetPax += p.targetPax || 0;
    t.actualPax += p.actualPax || 0;
    t.forecastPax += (p.actualPax || 0) + (p.estFuture || 0);
    t.forecastSales += p.forecastSales || 0;
    t.targetSales += (p.price && p.targetPax) ? p.price * p.targetPax : 0;
    t.maxSales += (p.price && p.maxPax) ? p.price * p.maxPax : 0;
  });
  t.pctTargetSold = t.targetPax > 0 ? t.actualPax / t.targetPax : 0;
  t.pctForecastVsTarget = t.targetPax > 0 ? t.forecastPax / t.targetPax : 0;
  return t;
}

// ═══════════════════════════════════════════
// FORMATTING
// ═══════════════════════════════════════════
const fmtUSD = n => n == null ? '—' : '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
const fmtPct = n => n == null ? '—' : (n * 100).toFixed(1) + '%';
const fmtNum = n => n == null ? '—' : n.toLocaleString('en-US');

// ═══════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════
let chartInstances = {};
const SEASON_KEYS = ['summer', 'fall', 'spring'];

function render(data) {
  currentData = data; // store for inline editing mutations
  // Update subtitle with dynamic years
  document.getElementById('subtitle').textContent =
    `${YEARS.summer}–${YEARS.spring} Seasonal Program Forecast`;
  document.getElementById('lastUpdated').textContent =
    'Last updated: ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  const totals = {};
  let grandTotals = { maxPax: 0, targetPax: 0, actualPax: 0, forecastPax: 0, forecastSales: 0, targetSales: 0 };

  SEASON_KEYS.forEach(key => {
    const programs = (data.seasons[key] && data.seasons[key].programs) || [];
    totals[key] = computeSeasonTotals(programs);
    grandTotals.maxPax += totals[key].maxPax;
    grandTotals.targetPax += totals[key].targetPax;
    grandTotals.actualPax += totals[key].actualPax;
    grandTotals.forecastPax += totals[key].forecastPax;
    grandTotals.forecastSales += totals[key].forecastSales;
    grandTotals.targetSales += totals[key].targetSales;
  });

  grandTotals.pctTargetSold = grandTotals.targetPax > 0 ? grandTotals.actualPax / grandTotals.targetPax : 0;
  grandTotals.pctForecastVsTarget = grandTotals.targetPax > 0 ? grandTotals.forecastPax / grandTotals.targetPax : 0;

  // KPI Cards
  const totalPrograms = SEASON_KEYS.reduce((s, k) => s + ((data.seasons[k] && data.seasons[k].programs) || []).length, 0);
  document.getElementById('kpiCards').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Total Forecast Sales</div>
      <div class="kpi-value">${fmtUSD(grandTotals.forecastSales)}</div>
      <div class="kpi-sub">NZD ${fmtUSD(Math.round(grandTotals.forecastSales * FX_RATE))}</div>
    </div>
    <div class="kpi-card orange">
      <div class="kpi-label">Target Sales</div>
      <div class="kpi-value">${fmtUSD(grandTotals.targetSales)}</div>
      <div class="kpi-sub">${fmtNum(grandTotals.targetPax)} target pax</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">% of Target Sold</div>
      <div class="kpi-value">${fmtPct(grandTotals.pctTargetSold)}</div>
      <div class="kpi-sub">${fmtNum(grandTotals.actualPax)} actual / ${fmtNum(grandTotals.targetPax)} target</div>
    </div>
    <div class="kpi-card ${grandTotals.pctForecastVsTarget >= 0.5 ? 'green' : 'red'}">
      <div class="kpi-label">Forecast vs Target</div>
      <div class="kpi-value">${fmtPct(grandTotals.pctForecastVsTarget)}</div>
      <div class="kpi-sub">${fmtNum(grandTotals.forecastPax)} forecast pax</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Programs</div>
      <div class="kpi-value">${totalPrograms}</div>
      <div class="kpi-sub">${fmtNum(grandTotals.maxPax)} max capacity</div>
    </div>
  `;

  // Goals
  document.getElementById('goalsSection').innerHTML = SEASON_KEYS.map(key => {
    const meta = SEASON_META[key];
    const t = totals[key];
    const goalPct = meta.goal.pct;
    const currentPct = t.pctTargetSold;
    const progressColor = currentPct >= goalPct ? 'green' : (currentPct >= goalPct * 0.5 ? 'orange' : 'red');
    return `<div class="goal-item">
      <span class="goal-season" style="color:${meta.color}">${meta.label}</span>
      <span class="goal-target">${(goalPct*100).toFixed(0)}% of target sold by ${meta.goal.deadline}</span>
      <div style="flex:1;max-width:200px;">
        <div class="progress-bar"><div class="progress-fill ${progressColor}" style="width:${Math.min(currentPct/goalPct*100,100)}%"></div></div>
      </div>
      <span class="goal-status" style="color:${currentPct >= goalPct ? 'var(--green)' : 'var(--red)'}">${fmtPct(currentPct)}</span>
    </div>`;
  }).join('');

  // Dynamic tabs — built from SEASON_KEYS + SEASON_META
  const tabNav = document.getElementById('tabNav');
  const tabPanes = document.getElementById('tabPanes');
  tabNav.innerHTML = SEASON_KEYS.map((key, i) =>
    `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchTab('${key}')">${SEASON_META[key].label}</button>`
  ).join('');
  tabPanes.innerHTML = SEASON_KEYS.map((key, i) =>
    `<div class="tab-pane ${i === 0 ? 'active' : ''}" id="tab-${key}"></div>`
  ).join('');

  // Season tables
  SEASON_KEYS.forEach(key => {
    const meta = SEASON_META[key];
    const programs = (data.seasons[key] && data.seasons[key].programs) || [];
    const t = totals[key];

    const rows = programs.map(p => {
      const estFuture = p.estFuturePax || p.estFuture || 0;
      const forecastPax = (p.actualPax || 0) + estFuture;
      const pctSold = p.targetPax > 0 ? p.actualPax / p.targetPax : null;
      const pctForecast = p.targetPax > 0 ? forecastPax / p.targetPax : null;
      const maxSales = p.price && p.maxPax ? p.price * p.maxPax : null;
      const targetSales = p.price && p.targetPax ? p.price * p.targetPax : null;
      const hsBadge = p._hubspot ? '<span class="hs-badge">HS</span>' : '';
      const pKey = p.hubspotName || p.name;
      const canEdit = !!GSHEET_API_URL;
      const editCell = (field, val) => canEdit
        ? `<td class="num editable" onclick="startEdit(this,'${pKey}','${key}','${field}',${val})">${fmtNum(val)}</td>`
        : `<td class="num">${fmtNum(val)}</td>`;
      return `<tr>
        <td class="program-name">${p.name}${hsBadge}</td>
        <td class="num">${p.price ? fmtUSD(p.price) : '—'}</td>
        ${editCell('max_pax', p.maxPax)}
        <td class="num">${maxSales ? fmtUSD(maxSales) : '—'}</td>
        ${editCell('target_pax', p.targetPax)}
        <td class="num">${targetSales ? fmtUSD(targetSales) : '—'}</td>
        <td class="num">${fmtNum(p.actualPax)}</td>
        ${editCell('est_future_pax', estFuture)}
        <td class="num">${fmtNum(forecastPax)}</td>
        <td class="num">${fmtUSD(p.forecastSales)}</td>
        <td class="num">${pctSold != null ? fmtPct(pctSold) : '—'}</td>
        <td class="num">${pctForecast != null ? fmtPct(pctForecast) : '—'}</td>
      </tr>`;
    }).join('');

    const editLegend = GSHEET_API_URL
      ? `<div class="edit-legend"><span class="swatch"></span> Click to edit — changes save to Google Sheet</div>`
      : '';

    document.getElementById(`tab-${key}`).innerHTML = `
      ${editLegend}
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>
            <th>Program</th><th class="num">Price</th><th class="num">Max Pax</th><th class="num">Max Sales</th>
            <th class="num">Target Pax</th><th class="num">Target Sales</th><th class="num">Actual Pax</th>
            <th class="num">Est. Future</th><th class="num">Forecast Pax</th><th class="num">Forecast Sales</th>
            <th class="num">% Sold</th><th class="num">% Forecast</th>
          </tr></thead>
          <tbody>
            ${rows}
            <tr class="subtotal">
              <td>Subtotal ${meta.label}</td>
              <td></td>
              <td class="num">${fmtNum(t.maxPax)}</td>
              <td class="num">${fmtUSD(t.maxSales)}</td>
              <td class="num">${fmtNum(t.targetPax)}</td>
              <td class="num">${fmtUSD(t.targetSales)}</td>
              <td class="num">${fmtNum(t.actualPax)}</td>
              <td class="num">${fmtNum(t.forecastPax - t.actualPax)}</td>
              <td class="num">${fmtNum(t.forecastPax)}</td>
              <td class="num">${fmtUSD(t.forecastSales)}</td>
              <td class="num">${fmtPct(t.pctTargetSold)}</td>
              <td class="num">${fmtPct(t.pctForecastVsTarget)}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <p class="fx-note">NZD equivalent (FX ${FX_RATE}): Forecast Sales ${fmtUSD(Math.round(t.forecastSales * FX_RATE))} | Target Sales ${fmtUSD(Math.round(t.targetSales * FX_RATE))}</p>
    `;
  });

  renderCharts(data, totals, grandTotals);
}

function renderCharts(data, totals, grandTotals) {
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  const labels = SEASON_KEYS.map(k => SEASON_META[k].label);
  const colors = SEASON_KEYS.map(k => SEASON_META[k].color);

  chartInstances.bar = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Target Sales', data: SEASON_KEYS.map(k => totals[k].targetSales), backgroundColor: 'rgba(27,42,74,0.15)', borderColor: 'rgba(27,42,74,0.4)', borderWidth: 1 },
        { label: 'Forecast Sales', data: SEASON_KEYS.map(k => totals[k].forecastSales), backgroundColor: colors.map(c => c + 'CC'), borderColor: colors, borderWidth: 1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } },
      scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + (v/1000).toFixed(0) + 'K' } } }
    }
  });

  chartInstances.doughnut = new Chart(document.getElementById('doughnutChart'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: SEASON_KEYS.map(k => totals[k].forecastSales), backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fmtUSD(ctx.parsed) } }
      }
    }
  });
}

// ═══════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// ═══════════════════════════════════════════
// DATA SOURCE HANDLING
// ═══════════════════════════════════════════
async function handleSourceChange() {
  const source = document.getElementById('dataSource').value;
  const statusEl = document.getElementById('hubspotStatus');
  statusEl.textContent = '';

  if (source === 'hubspot') {
    document.getElementById('loadingText').textContent = 'Fetching live data from HubSpot + Google Sheet...';
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('errorState').style.display = 'none';
    try {
      let data = await fetchHubSpotData();
      data = await fetchAndMergeSheetData(data);
      document.getElementById('loadingState').style.display = 'none';
      statusEl.textContent = '● Live';
      statusEl.style.color = '#70AD47';
      render(data);
    } catch (e) {
      document.getElementById('loadingState').style.display = 'none';
      statusEl.textContent = '● Offline';
      statusEl.style.color = '#E74C3C';
      const isLocal = window.location.protocol === 'file:';
      const helpText = isLocal
        ? 'HubSpot integration requires deployment to Netlify. For local preview, use Embedded data.'
        : `Error: ${e.message}. Check that HUBSPOT_TOKEN is set in Netlify environment variables.`;
      document.getElementById('errorState').innerHTML = `<div class="error-msg">${helpText}</div>`;
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('dataSource').value = 'embedded';
      let fallback = JSON.parse(JSON.stringify(EMBEDDED_DATA));
      fallback = await fetchAndMergeSheetData(fallback);
      render(fallback);
    }
  } else if (source === 'gsheet') {
    if (!GSHEET_CSV_URL) {
      document.getElementById('errorState').innerHTML = '<div class="info-msg">To connect Google Sheets: open your spreadsheet → File → Share → Publish to web → CSV format → paste URL into <code>GSHEET_CSV_URL</code>.</div>';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('dataSource').value = 'embedded';
      return;
    }
    document.getElementById('loadingText').textContent = 'Fetching data from Google Sheets...';
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('errorState').style.display = 'none';
    try {
      const data = await fetchGoogleSheet(GSHEET_CSV_URL);
      document.getElementById('loadingState').style.display = 'none';
      render(data);
    } catch (e) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').innerHTML = `<div class="error-msg">Error loading Google Sheet: ${e.message}.</div>`;
      document.getElementById('errorState').style.display = 'block';
      render(EMBEDDED_DATA);
    }
  } else {
    document.getElementById('errorState').style.display = 'none';
    let data = JSON.parse(JSON.stringify(EMBEDDED_DATA));
    data = await fetchAndMergeSheetData(data);
    render(data);
  }
}

// ═══════════════════════════════════════════
// INLINE EDITING (writes back to Google Sheet)
// ═══════════════════════════════════════════
let currentData = null; // holds active dataset for local mutation after edits

function startEdit(cell, programKey, season, field, currentValue) {
  if (!GSHEET_API_URL) return;
  // Prevent double-editing if already has an input
  if (cell.querySelector('input')) return;

  const input = document.createElement('input');
  input.type = 'number';
  input.min = '0';
  input.value = currentValue || 0;
  cell.textContent = '';
  cell.appendChild(input);
  input.focus();
  input.select();

  const commit = async () => {
    const newVal = parseInt(input.value) || 0;
    if (newVal === currentValue) {
      // No change — just restore display
      cell.textContent = fmtNum(currentValue);
      return;
    }
    cell.textContent = fmtNum(newVal);
    try {
      await saveToSheet(programKey, season, field, newVal);
      // Update local data and re-render to recalculate totals/charts
      updateLocalData(programKey, season, field, newVal);
      showSaveIndicator(cell, true);
    } catch (e) {
      console.error('Save failed:', e);
      cell.textContent = fmtNum(currentValue);
      showSaveIndicator(cell, false);
    }
  };

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { cell.textContent = fmtNum(currentValue); }
  });
  input.addEventListener('blur', commit);
}

async function saveToSheet(programKey, season, field, value) {
  const params = new URLSearchParams({
    action: 'update',
    programKey,
    season,
    field,
    value: String(value),
  });
  const url = `${GSHEET_API_URL}?${params.toString()}`;
  const resp = await fetch(url);
  const text = await resp.text();
  let result;
  try { result = JSON.parse(text); } catch { result = { status: 'ok' }; }
  if (result.status === 'error') throw new Error(result.message || 'Save failed');
  return result;
}

function updateLocalData(programKey, season, field, newVal) {
  if (!currentData || !currentData.seasons[season]) return;
  const programs = currentData.seasons[season].programs;
  const prog = programs.find(p => (p.hubspotName || p.name) === programKey);
  if (!prog) return;

  // Map sheet field names to local data property names
  const fieldMap = { max_pax: 'maxPax', target_pax: 'targetPax', est_future_pax: 'estFuture' };
  const localField = fieldMap[field];
  if (localField) {
    prog[localField] = newVal;
    // Also update estFuturePax alias used by HubSpot-sourced data
    if (field === 'est_future_pax') prog.estFuturePax = newVal;
  }

  // Re-render with updated data (recalculates subtotals, KPIs, charts)
  render(currentData);
}

function showSaveIndicator(cell, success) {
  const existing = cell.querySelector('.save-indicator');
  if (existing) existing.remove();
  const badge = document.createElement('span');
  badge.className = `save-indicator ${success ? 'save-ok' : 'save-err'}`;
  badge.textContent = success ? '✓ saved' : '✗ error';
  cell.appendChild(badge);
  setTimeout(() => badge.remove(), 2500);
}

// Always try HubSpot first — prices live there
async function initDataSource() {
  const isLocal = window.location.protocol === 'file:';
  if (isLocal) {
    render(EMBEDDED_DATA);
  } else {
    document.getElementById('dataSource').value = 'hubspot';
    await handleSourceChange();
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
initDataSource();
</script>
